aid: bloomberg-product-suite
name: Bloomberg Product Suite
description: Bloomberg's Product Suite encompasses the complete portfolio of Bloomberg
  professional products including the Bloomberg Terminal, data products, analytics
  solutions, trading platforms, media, and technology infrastructure. The suite serves
  financial professionals across asset management, banking, insurance, government,
  and corporate sectors with integrated data, analytics, and workflow tools.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/bloomberg-product-suite/refs/heads/main/apis.yml
created: '2024-01-01'
modified: '2026-04-21'
specificationVersion: '0.19'
tags:
- Product Suite
- Terminal
- Data
- Analytics
- Trading
- Financial Technology
- Bloomberg
apis:
- aid: bloomberg-product-suite:blpapi
  name: Bloomberg Open API (BLPAPI)
  description: The core API providing programmatic access to the Bloomberg data ecosystem
    including real-time prices, reference data, news, analytics, and Terminal functions.
  humanURL: https://bloomberg.github.io/blpapi-docs/
  baseURL: blpapi://localhost:8194
  tags:
  - Core API
  - Market Data
  - Reference Data
  properties:
  - type: Documentation
    url: https://bloomberg.github.io/blpapi-docs/
- aid: bloomberg-product-suite:data-license
  name: Bloomberg Data License
  description: Enterprise bulk data delivery platform for acquiring Bloomberg reference
    data, pricing, corporate actions, and analytics at scale for data management
    and downstream applications.
  humanURL: https://www.bloomberg.com/professional/products/data/data-management/data-license/
  baseURL: https://dlws.bloomberg.com
  tags:
  - Data License
  - Bulk Data
  - Enterprise
  properties:
  - type: Documentation
    url: https://www.bloomberg.com/professional/products/data/data-management/data-license/
- aid: bloomberg-product-suite:bloomberg-anywhere
  name: Bloomberg Anywhere
  description: Remote access service extending Bloomberg Terminal capabilities to
    any internet-connected device, enabling mobile and remote access to Bloomberg
    data, analytics, and messaging.
  humanURL: https://www.bloomberg.com/professional/solution/bloomberg-anywhere/
  baseURL: https://bba.bloomberg.net
  tags:
  - Remote Access
  - Mobile
  - Bloomberg Anywhere
  properties:
  - type: Documentation
    url: https://www.bloomberg.com/professional/solution/bloomberg-anywhere/
